server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html 200.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1024;

    # SPA fallback — adapter-static emits 200.html as the SPA shell
    location / {
        try_files $uri $uri/ /200.html /index.html =404;
    }

    # Cache immutable assets (content-hashed filenames)
    location ~* /_app/immutable/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Cache other static assets
    location ~* \.(js|css|woff2?|ttf|eot|ico|png|jpg|jpeg|gif|svg|webp|avif|webmanifest)$ {
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    # Service worker must never be cached
    location = /sw.js {
        expires off;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
