name: Deploy to mainnet
on: push

jobs:
  mainnet-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-node@v2
        with:
          node-version: "16"
      - run: npm install
      - run: |
          touch .env.ic
          echo "VITE_CLOUDFLARE_WORKERS_API_URL=\"$VITE_CLOUDFLARE_WORKERS_API_URL\"" >> .env.ic
          echo "VITE_INTERNET_IDENTITY_URL=\"$VITE_INTERNET_IDENTITY_URL\"" >> .env.ic
        env:
          VITE_CLOUDFLARE_WORKERS_API_URL: "https://go-bazzinga-dapp-api-main.go-bazzinga.workers.dev"
          VITE_INTERNET_IDENTITY_URL: "https://identity.ic0.app/#authorize"
      - run: npm run build
      - run: DFX_VERSION=0.9.3 sh -ci "$(curl -fsSL https://smartcontracts.org/install.sh)"
      - run: dfx identity list
      - run: |
          touch actions_identity.pem
          echo "${{ secrets.ACTIONS_IDENTITY_SECRET }}" > actions_identity.pem
          dfx identity import actions actions_identity.pem
          rm actions_identity.pem
          dfx identity use actions
      - run: dfx identity --network ic set-wallet ${{ secrets.ACTIONS_IDENTITY_DEFAULT_WALLET }}
      - run: dfx deploy --network ic
  worker-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: cloudflare/wrangler-action@1.3.0
        with:
          apiToken: ${{ secrets.WORKERS_API_TOKEN }}
          environment: "main"
          workingDirectory: "workers/api"
          secrets: |
            CLOUDFLARE_API_TOKEN
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_STREAM_API_TOKEN }}
