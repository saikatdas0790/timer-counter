name: Build and push Docker image

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # devcontainer.json bind-mounts ~/.ssh/agent.sock, ~/.config/gh, and
      # the parent repo's .git dir. CI runners don't have these paths, so
      # create placeholder stubs to prevent Docker from failing on missing
      # bind-mount sources.
      - name: Create bind-mount stubs for devcontainer
        run: |
          mkdir -p ~/.ssh && touch ~/.ssh/agent.sock
          mkdir -p ~/.config/gh
          mkdir -p "$GITHUB_WORKSPACE/../../.git"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Run npm ci + npm run build inside the devcontainer so CI uses exactly
      # the same environment as local development. The devcontainer image is
      # cached in GHCR so subsequent runs are fast.
      - name: Build inside dev container
        uses: devcontainers/ci@v0.3
        with:
          imageName: ghcr.io/${{ github.repository_owner }}/timer-counter-devcontainer
          cacheFrom: ghcr.io/${{ github.repository_owner }}/timer-counter-devcontainer
          runCmd: .devcontainer/postCreate.sh && npm ci && npm run build
          push: filter

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=ts-{{date 'YYYYMMDDHHMMSS'}}-{{sha}},enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      # The build/ directory was produced by the devcontainer step above.
      # The Dockerfile now just copies it into nginx — no node build stage needed.
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
